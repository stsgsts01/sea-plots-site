<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Участок 320 соток у моря — Евпатория, Крым</title>

<meta name="description" content="Земельный участок 320 соток у моря возле Евпатории. Первая линия, около 100 метров до моря.">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f3efe6;
color:#333;
}

header{
background:#e6dccb;
padding:20px;
text-align:center;
font-size:24px;
}

.hero{
height:70vh;
background:#c9b79c;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
color:white;
}

.section{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

.map{

button{

<body>

Земельный участок у моря — Евпатория

<div class="hero">
320 СОТОК • ПЕРВАЯ ЛИНИЯ

<div class="section">

</tr>

</tr>

<td>Гостиница / турбаза / апарт-отель</td>
</tr>

</div>

<button>Получить цену участка</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([45.2,33.0],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

</script>
